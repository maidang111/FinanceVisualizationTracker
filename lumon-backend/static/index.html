<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #18181b;
      color: #fff;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #conversation-label {
      font-size: 12px;
      color: #a1a1aa;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: #18181b;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #fff;
      color: #18181b;
      border: 1px solid #e4e4e7;
      border-bottom-left-radius: 4px;
    }

    .message.thinking {
      align-self: flex-start;
      background: #fff;
      color: #a1a1aa;
      border: 1px solid #e4e4e7;
      border-bottom-left-radius: 4px;
      font-style: italic;
    }

    #input-area {
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid #e4e4e7;
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      resize: none;
      height: 42px;
    }

    #user-input:focus {
      border-color: #18181b;
    }

    button {
      padding: 10px 20px;
      background: #18181b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      background: #a1a1aa;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<header>
  Finance Assistant
  <span id="conversation-label">starting...</span>
</header>

<div id="messages"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="Ask about your finances..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  let conversationId = null;

  async function startConversation() {
    const res = await fetch("/agent/conversations", { method: "POST" });
    const data = await res.json();
    conversationId = data.conversation_id;
    document.getElementById("conversation-label").textContent = `conversation #${conversationId}`;
  }

  function appendMessage(role, content) {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = content;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const text = input.value.trim();
    if (!text || !conversationId) return;

    input.value = "";
    btn.disabled = true;
    appendMessage("user", text);

    const thinking = appendMessage("thinking", "Thinking...");

    try {
      const res = await fetch(`/agent/conversations/${conversationId}/messages`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: text }),
      });
      const data = await res.json();
      thinking.remove();
      appendMessage("assistant", data.content);
    } catch (err) {
      thinking.remove();
      appendMessage("assistant", "Error: could not reach the server.");
    }

    btn.disabled = false;
    input.focus();
  }

  // Send on Enter (Shift+Enter for newline)
  document.getElementById("user-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  startConversation();
</script>

</body>
</html>
